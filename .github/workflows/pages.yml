name: Deploy GitHub Pages

# Publishes the self-contained browser edition (docs/index.html) to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Build and deployment ->
#   Source: "GitHub Actions". After that this runs automatically on every push.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
